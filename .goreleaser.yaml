version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: ocp
    binary: ocp
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/tcdw/opencode-profile/internal/cli.Version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
      {{- with .Arm }}v{{ . }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

# Release notes are supplied via `goreleaser release --release-notes=RELEASE_NOTES.md`
# (extracted from CHANGELOG.md by ffurrer2/extract-release-notes in CI). GoReleaser
# reads that file INSIDE the changelog pipe and short-circuits its own git-log
# generation, so the pipe must stay enabled — do NOT set `changelog.disable: true`,
# or the pipe is skipped and the release body comes out empty.
